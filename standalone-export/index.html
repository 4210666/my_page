<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>shorelinesky</title>
  <meta name="description" content="shorelinesky · 张天硕的全屏首页，适配手机和电脑。">
  <style>
    :root{
      --bg:#07111f;
      --text:#f8fafc;
      --muted:rgba(248,250,252,.76);
      --line:rgba(255,255,255,.18);
      --accent:#f2b8c6;
      --shadow:0 24px 80px rgba(0,0,0,.28);
      --font-display:"Iowan Old Style","Palatino Linotype","Noto Serif SC","Songti SC",serif;
      --font-body:"Noto Sans SC","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth;background:var(--bg)}
    body{
      margin:0;
      font-family:var(--font-body);
      color:var(--text);
      background:var(--bg);
      overflow-x:hidden;
      text-rendering:optimizeLegibility;
      -webkit-font-smoothing:antialiased;
      font-synthesis-weight:none;
    }
    a{color:inherit;text-decoration:none}
    .page{min-height:100svh;background:var(--bg)}
    .hero{
      position:relative;
      isolation:isolate;
      min-height:100svh;
      overflow:clip;
      display:grid;
      align-items:end;
    }
    .hero-bg,.hero-veil,.hero-vignette{position:absolute;inset:0}
    .hero-bg{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center 34%;
      transform:scale(1.06);
      animation:slow-zoom 18s ease-in-out infinite alternate;
    }
    .hero-veil{
      background:
        linear-gradient(110deg, rgba(4,8,16,.86) 0%, rgba(4,8,16,.42) 42%, rgba(4,8,16,.18) 100%),
        linear-gradient(180deg, rgba(4,8,16,.12) 0%, rgba(4,8,16,.38) 100%);
    }
    .hero-vignette{
      pointer-events:none;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.12), transparent 28%),
        radial-gradient(circle at 82% 24%, rgba(255,211,220,.22), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(0,0,0,0), rgba(0,0,0,.18) 100%);
    }
    .hero-shell{
      position:relative;
      z-index:1;
      width:min(1120px, calc(100% - 32px));
      margin:0 auto;
      padding:28px 0 34px;
      min-height:100svh;
      display:grid;
      grid-template-rows:auto 1fr;
      gap:40px;
    }
    .brand{
      display:inline-flex;
      align-items:center;
      gap:14px;
      width:fit-content;
      padding:8px 12px 8px 8px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(255,255,255,.07);
      backdrop-filter:blur(14px);
      box-shadow:0 10px 30px rgba(0,0,0,.14);
      animation:fade-in-up 900ms ease both;
    }
    .brand-mark{
      width:38px;
      height:38px;
      display:block;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.12);
      object-fit:cover;
    }
    .brand-copy{display:grid;gap:2px}
    .brand-name{
      margin:0;
      font-size:.78rem;
      line-height:1;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:rgba(255,255,255,.82);
    }
    .brand-subtitle{
      margin:0;
      font-size:.95rem;
      line-height:1.2;
      color:rgba(255,255,255,.74);
    }
    .hero-copy{
      align-self:end;
      max-width:760px;
      padding:clamp(12px, 2vw, 24px) 0 0;
      animation:fade-in-up 1000ms ease 120ms both;
    }
    .eyebrow{
      margin:0;
      width:fit-content;
      padding:8px 14px;
      border:1px solid rgba(255,255,255,.22);
      border-radius:999px;
      background:rgba(255,255,255,.08);
      color:rgba(255,255,255,.84);
      font-size:.88rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      backdrop-filter:blur(12px);
    }
    h1{
      margin:18px 0 0;
      max-width:9ch;
      font-family:var(--font-display);
      font-size:clamp(3.8rem, 10vw, 8.2rem);
      line-height:.92;
      letter-spacing:-.06em;
      color:#fff;
      text-shadow:0 8px 28px rgba(0,0,0,.24);
    }
    .lede{
      margin:18px 0 0;
      max-width:58ch;
      font-size:clamp(1rem, 2vw, 1.18rem);
      line-height:1.85;
      color:var(--muted);
      text-wrap:balance;
    }
    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:30px;
    }
    .button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:0 20px;
      border-radius:999px;
      border:1px solid transparent;
      font-size:.96rem;
      font-weight:600;
      letter-spacing:.01em;
      transition:transform 180ms ease, border-color 180ms ease, background-color 180ms ease, color 180ms ease;
    }
    .button:hover{transform:translateY(-1px)}
    .button-primary{
      background:rgba(255,255,255,.96);
      color:#102032;
      box-shadow:0 16px 34px rgba(0,0,0,.18);
    }
    .button-primary:hover{background:#fff}
    .button-secondary{
      border-color:rgba(255,255,255,.2);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.92);
      backdrop-filter:blur(10px);
    }
    .button-secondary:hover{
      border-color:rgba(255,255,255,.32);
      background:rgba(255,255,255,.1);
    }
    .footnote{
      margin:18px 0 0;
      max-width:54ch;
      font-size:.95rem;
      line-height:1.8;
      color:rgba(255,255,255,.7);
    }
    .scroll-hint{
      position:absolute;
      right:0;
      bottom:18px;
      z-index:2;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      color:rgba(255,255,255,.74);
      font-size:.86rem;
      letter-spacing:.1em;
      text-transform:uppercase;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.14);
      backdrop-filter:blur(12px);
      animation:fade-in-up 1100ms ease 220ms both;
    }
    .scroll-dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--accent);
      box-shadow:0 0 0 0 rgba(242,184,198,.65);
      animation:pulse 2.4s ease-in-out infinite;
    }
    @keyframes fade-in-up{
      from{opacity:0;transform:translateY(16px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes slow-zoom{
      from{transform:scale(1.04) translate3d(0,0,0)}
      to{transform:scale(1.1) translate3d(0,-1.2%,0)}
    }
    @keyframes pulse{
      0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(242,184,198,.45)}
      50%{transform:scale(1.05);box-shadow:0 0 0 10px rgba(242,184,198,0)}
    }
    @media (max-width:767px){
      .hero-bg{object-position:50% 32%}
      .hero-shell{
        width:min(100%, calc(100% - 24px));
        padding:18px 0 24px;
        gap:24px;
      }
      .hero-copy{padding-bottom:28px}
      h1{max-width:8ch;font-size:clamp(3rem, 16vw, 4.8rem)}
      .scroll-hint{
        left:12px;
        right:12px;
        justify-content:center;
        text-align:center;
        bottom:12px;
      }
    }
    @media (prefers-reduced-motion:reduce){
      html{scroll-behavior:auto}
      .hero-bg,.brand,.hero-copy,.scroll-hint,.scroll-dot{animation:none !important}
      .button{transition:none}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="hero-title">
      <img class="hero-bg" src="sakura-wallpaper.jpg" alt="" aria-hidden="true">
      <div class="hero-veil"></div>
      <div class="hero-vignette"></div>

      <div class="hero-shell">
        <header class="brand" id="brand">
          <img class="brand-mark" src="ecust-logo.png" alt="shorelinesky 标志">
          <div class="brand-copy">
            <p class="brand-name">shorelinesky</p>
            <p class="brand-subtitle">张天硕</p>
          </div>
        </header>

        <div class="hero-copy">
          <p class="eyebrow">Sakura / Responsive / Cloudflare Pages</p>
          <h1 id="hero-title">shorelinesky</h1>
          <p class="lede">
            一个干净、克制、能在手机和电脑上稳定显示的首页。用樱花壁纸做全屏主视觉，把品牌、标题和下一步动作放进同一张画面里。
          </p>

          <div class="actions">
            <a class="button button-primary" href="/defense">查看展示页</a>
            <a class="button button-secondary" href="mailto:hello@example.com">联系我</a>
          </div>

          <p class="footnote">
            桌面端保持宽屏构图，移动端自动收拢为单列，避免信息堆叠和卡片噪音。
          </p>
        </div>
      </div>

      <a class="scroll-hint" href="#brand" aria-label="返回顶部">
        <span class="scroll-dot"></span>
        <span>shorelinesky · 张天硕</span>
      </a>
    </section>
  </main>
</body>
</html>
